version: "2.1"

volumes:
  mariadb-data:
  zabbix-alertscripts:
  zabbix-externalscripts:
  zabbix-modules:
  zabbix-enc:
  grafana-data:

services:
  usb-storage:
    build: ./usb-storage
    restart: unless-stopped
    privileged: true
    network_mode: host
    labels:
      io.balena.features.dbus: "1"
      io.balena.features.kernel-modules: "1"

  backup-rotate:
    build: ./backup-rotate
    restart: unless-stopped
    privileged: true
    depends_on:
      - mariadb
    environment:
      USB_MOUNT_POINT: /mnt/usb
      BACKUP_DIR: /mnt/usb/backups/mariadb
      DB_HOST: mariadb

  mariadb:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      TZ: "Asia/Tokyo"
      MARIADB_DATABASE: "zabbix"
      MARIADB_USER: "zabbix"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --transaction-isolation=READ-COMMITTED
      - --binlog-format=ROW
      - --log-bin-trust-function-creators=1
    volumes:
      - mariadb-data:/var/lib/mysql

  zabbix-server:
    image: zabbix/zabbix-server-mysql:alpine-7.0-latest
    restart: unless-stopped
    depends_on:
      - mariadb
    environment:
      TZ: "Asia/Tokyo"
      DB_SERVER_HOST: "mariadb"
      MYSQL_DATABASE: "zabbix"
      MYSQL_USER: "zabbix"
      ZBX_STARTPOLLERS: "10"
      ZBX_STARTPINGERS: "4"
      ZBX_CACHE_SIZE: "128M"
      ZBX_HISTORYCACHESIZE: "32M"
      ZBX_TRENDCACHESIZE: "32M"
      ZBX_VALUECACHESIZE: "64M"
    ports:
      - "10051:10051"
    volumes:
      - zabbix-alertscripts:/usr/lib/zabbix/alertscripts
      - zabbix-externalscripts:/usr/lib/zabbix/externalscripts
      - zabbix-modules:/var/lib/zabbix/modules
      - zabbix-enc:/var/lib/zabbix/enc

  zabbix-web:
    image: zabbix/zabbix-web-nginx-mysql:alpine-7.0-latest
    restart: unless-stopped
    depends_on:
      - mariadb
      - zabbix-server
    environment:
      TZ: "Asia/Tokyo"
      DB_SERVER_HOST: "mariadb"
      MYSQL_DATABASE: "zabbix"
      MYSQL_USER: "zabbix"
      ZBX_SERVER_HOST: "zabbix-server"
      PHP_TZ: "Asia/Tokyo"
    ports:
      - "8080:8080"

  grafana:
    image: grafana/grafana-oss:11.1.0
    restart: unless-stopped
    depends_on:
      - mariadb
    environment:
      TZ: "Asia/Tokyo"
      GF_SERVER_HTTP_PORT: "3000"
      GF_SECURITY_ADMIN_USER: "admin"
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    depends_on:
      - zabbix-web
      - grafana
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - |
        if [ -z "$CF_TUNNEL_TOKEN" ]; then
          echo "CF_TUNNEL_TOKEN is not set. cloudflared stays idle."
          exec sleep infinity
        fi
        exec cloudflared tunnel --no-autoupdate run --token "$CF_TUNNEL_TOKEN"
